<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tanshi's 6-Month Sprint</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <div class="logo">
        <svg viewBox="0 0 100 100" width="34" height="34" aria-label="Blob">
          <circle cx="50" cy="50" r="42" fill="#fff" stroke="#1f1d22" stroke-width="6"/>
          <circle cx="34" cy="56" r="4.5" fill="#1f1d22"/>
          <circle cx="66" cy="56" r="4.5" fill="#1f1d22"/>
          <path d="M42 70 Q50 76 58 70" fill="none" stroke="#1f1d22" stroke-width="4.5" stroke-linecap="round"/>
          <path d="M18 62 l-4 6 M24 65 l-4 6" stroke="#f29db4" stroke-width="3" stroke-linecap="round"/>
          <path d="M82 62 l4 6 M76 65 l4 6" stroke="#f29db4" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="title">
        <h1>Tanshi's 6-Month Sprint</h1>
        <p>CAT 2026 + health · consistent actions create consistent results.</p>
      </div>
      <div class="spacer"></div>
      <div class="top-actions">
        <button class="btn" id="backupBtn" data-act="backup" style="display:none">Backup</button>
        <button class="btn" data-act="export">⬇ Export</button>
        <button class="btn" data-act="import">⬆ Import</button>
        <button class="btn danger" data-act="reset">Reset</button>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="today">Today</button>
      <button class="tab" data-tab="study">Study</button>
      <button class="tab" data-tab="dashboard">Dashboard</button>
      <button class="tab" data-tab="reports">Reports</button>
    </nav>

    <main id="view"></main>

    <footer class="footer">Tanshi's 6-Month Sprint · all data stays in your browser (localStorage) · Export regularly</footer>
  </div>

  <input type="file" id="importFile" accept="application/json" style="display:none">
  <div id="toast"></div>

  <script src="foods.js"></script>
  <script src="core.js"></script>
  <script src="backup.js"></script>
  <script src="mascot.js"></script>
  <script src="charts.js"></script>
  <script src="app.js"></script>
</body>
</html>
